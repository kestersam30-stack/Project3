apiVersion: v1
kind: Service
metadata:
  name: brain-task-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-type: "classic"
spec:
  type: LoadBalancer
  selector:
    app: brain-task
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
