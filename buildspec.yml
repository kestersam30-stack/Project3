version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "ap-south-1"
    # Replace with your actual ID, but keep it in quotes
    REPOSITORY_URI: "123456789012.dkr.ecr.ap-south-1.amazonaws.com/your-repo-name"

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI
  build:
    commands:
      - echo Build started on `date`
      # ... your build commands