apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-tasks-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: brain-task
  template:
    metadata:
      labels:
        app: brain-task
    spec:
      containers:
      - name: brain-tasks-container
        image: 404198732694.dkr.ecr.ap-south-1.amazonaws.com/ns/app3:latest
        ports:
        - containerPort: 80